services:
  - type: web
    name: statu-meetings
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: METERED_DOMAIN
        value: system4.metered.live
      - key: METERED_API_KEY
        value: c153db0d8dfe9e3e3b92387b841e18014b9b
